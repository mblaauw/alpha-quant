[bootstrap]
symbols = ["NVDA", "MSFT", "GOOGL", "ASML", "QBTS", "RGTI", "IONQ"]
history_years = 3
include_benchmarks = ["SPY", "^VIX"]

[data]
indicator_state = true
staleness_halt_hours = 30
fixture_version = "v1"

[universe]
min_price = 5.0
min_adv_usd = 5_000_000
index_base = "sp500_plus_midcap400"

[portfolio]
max_positions = 8
max_position_pct = 0.15
max_gross_exposure = 0.80
risk_per_trade_pct = 0.01
max_sector_positions = 2

[paper]
starting_equity = 100000
slippage_bps = 5
spread_model = "half_spread_estimate"

[risk]
stop_atr_mult = 2.0
trail_after_r = 1.0
partial_take_at_r = 2.0
time_stop_days = 30
dd_ladder = [[0.10, 0.5], [0.15, 0.0]]
daily_loss_halt_pct = 0.03

[shadow]
books = ["RULES_ONLY", "NO_INSIDER", "NO_CROWDING_VETO"]

[llm]
provider = "openrouter"
model = "anthropic/claude-sonnet-4"
base_url = ""
timeout_s = 30

[education]
level = "beginner"
concept_repeat_limit = 3

[eodhd]
api_key = ""
base_url = "https://eodhd.com/api"

[alpaca]
api_key = ""
secret_key = ""
base_url = "https://data.alpaca.markets"

[connector]
user_agent = "AlphaQuant/0.2.0 (research project; contact m@mblaauw.dev)"
tokens_per_second = 10.0
max_burst = 20.0
default_timeout_s = 30.0

[adapters.fundamentals]
primary = "sec_edgar"

[adapters.fundamentals.sources.sec_edgar]
enabled = true

[adapters.fundamentals.sources.eodhd]
enabled = false

[dashboard]
host = "localhost"
port = 8501
refresh_seconds = 60
