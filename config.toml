[bootstrap]
symbols = ["AAPL", "MSFT", "NVDA", "GOOGL", "AMZN", "META", "TSLA", "JPM", "V", "JNJ"]
history_years = 3
include_benchmarks = ["SPY", "^VIX"]

[data]
raw_tail_days = 50
indicator_state = true
staleness_halt_hours = 30
fixture_version = "fx-2026-06-v1"

[universe]
min_price = 5.0
min_adv_usd = 5_000_000
index_base = "sp500_plus_midcap400"

[portfolio]
starting_equity = 100_000.0
max_positions = 10
max_position_pct = 0.15
max_gross_pct = 0.80
max_per_sector = 2

[risk]
atr_multiple = 2.0
partial_at = 2.0
time_stop_days = 30
max_daily_loss_pct = 0.02
max_drawdown_pct = 0.15

[weights]
technical = 0.6
momentum = 0.25
insider = 0.15

[llm]
provider = "openai"
model = "gpt-4o-mini"
temperature = 0.7
max_tokens = 2048

[dashboard]
host = "localhost"
port = 8501
refresh_seconds = 60

[eodhd]
api_key = ""
base_url = "https://eodhd.com/api"

[alpaca]
api_key = ""
secret_key = ""
base_url = "https://data.alpaca.markets"
