<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a08030"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#46ebe1"/>
      <stop offset="100%" stop-color="#2a9d8f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.08" stroke="#c9a84c" stroke-width="0.5">
    <line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="64" y1="0" x2="64" y2="256"/>
    <line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="192" y1="0" x2="192" y2="256"/>
  </g>

  <!-- Outer ring glow -->
  <circle cx="128" cy="128" r="96" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.2" filter="url(#glowStrong)"/>

  <!-- Outer ring -->
  <circle cx="128" cy="128" r="90" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.6"/>

  <!-- Inner ring -->
  <circle cx="128" cy="128" r="76" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3" stroke-dasharray="4 6"/>

  <!-- Alpha symbol (α) - centered in circle -->
  <g transform="translate(128, 132)" filter="url(#glow)">
    <!-- Left arc -->
    <path d="M -10 -50 C -32 -50 -50 -30 -50 -5 C -50 20 -32 40 -5 40 C 22 40 45 20 50 -2 C 52 -10 48 -22 38 -32 L -22 -58"
          stroke="url(#gold)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- Right tail -->
    <path d="M 30 -38 L 48 -56" stroke="url(#gold)" stroke-width="6" stroke-linecap="round"/>
    <!-- Horizontal crossbar -->
    <line x1="-12" y1="-4" x2="38" y2="-4" stroke="url(#teal)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="2.5" fill="#c9a84c" opacity="0.6"/>
  <circle cx="176" cy="168" r="2.5" fill="#46ebe1" opacity="0.6"/>

  <!-- Bottom text -->
  <text x="128" y="218" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle" letter-spacing="4">ALPHA</text>
  <text x="128" y="238" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="400" fill="#7a8a9a" text-anchor="middle" letter-spacing="3">QUANT</text>
</svg>
