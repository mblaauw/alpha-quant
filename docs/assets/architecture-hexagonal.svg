<svg viewBox="0 0 1280 840" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.2" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M1,1 L8,4.5 L1,8 Z" fill="#64748B"/>
    </marker>
    <style>
      .title  { font-size: 26px; font-weight: 700; fill: #1E293B; }
      .sub    { font-size: 13px; fill: #64748B; }
      .colhdr { font-size: 12px; font-weight: 700; fill: #475569; letter-spacing: 1.4px; }
      .core   { font-size: 13px; font-weight: 700; fill: #4338CA; letter-spacing: 1.2px; }
      .corei  { font-size: 10.5px; fill: #6366F1; font-style: italic; }
      .corel  { font-size: 13px; fill: #312E81; }
      .applbl { font-size: 11px; font-weight: 700; fill: #475569; letter-spacing: 2px; }
      .appcap { font-size: 11.5px; fill: #64748B; }
      .port   { font-size: 14px; font-weight: 700; fill: #0F766E; }
      .adapt  { font-size: 13px; font-weight: 600; fill: #334155; }
      .adaptf { font-size: 13px; font-weight: 600; fill: #9A3412; }
      .badge  { font-size: 8.5px; font-weight: 700; letter-spacing: 0.8px; }
      .drv    { font-size: 14px; font-weight: 700; fill: #1E293B; }
      .drvs   { font-size: 11px; fill: #64748B; }
      .legend { font-size: 11.5px; fill: #475569; }
      .foot   { font-size: 11px; fill: #94A3B8; }
      .vlabel { font-size: 10px; font-weight: 700; fill: #0D9488; letter-spacing: 1px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="840" rx="20" fill="#F7F8FB"/>
  <rect x="0" y="0" width="1280" height="6" rx="3" fill="#4F46E5"/>

  <!-- Heading -->
  <text x="40" y="54" class="title">Alpha-Quant — Hexagonal (Ports &amp; Adapters) Architecture</text>
  <text x="40" y="80" class="sub">Pure domain core · contract ports · a real adapter and a fixture-backed fake twin on every port</text>

  <!-- Column headers -->
  <text x="151" y="132" class="colhdr" text-anchor="middle">DRIVING ADAPTERS</text>
  <text x="759" y="132" class="colhdr" text-anchor="middle">PORTS · contracts</text>
  <text x="1037" y="132" class="colhdr" text-anchor="middle">DRIVEN ADAPTERS — REAL / FAKE TWIN</text>

  <!-- ===================== HEXAGON (app + domain) ===================== -->
  <!-- outer hexagon = application boundary -->
  <polygon points="470,215 656.2,322.5 656.2,537.5 470,645 283.8,537.5 283.8,322.5"
           fill="#E9EEF6" stroke="#94A3B8" stroke-width="1.5" filter="url(#soft)"/>
  <text x="470" y="250" class="applbl" text-anchor="middle">APPLICATION</text>

  <!-- inner hexagon = pure domain core -->
  <polygon points="470,285 595.6,357.5 595.6,502.5 470,575 344.4,502.5 344.4,357.5"
           fill="#EEF0FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="470" y="322" class="core"  text-anchor="middle">DOMAIN CORE</text>
  <text x="470" y="339" class="corei" text-anchor="middle">pure functions · zero I/O</text>
  <line x1="372" y1="350" x2="568" y2="350" stroke="#C7D2FE" stroke-width="1"/>
  <text x="470" y="378" class="corel" text-anchor="middle">Decision engine · M1–M8</text>
  <text x="470" y="402" class="corel" text-anchor="middle">Sizing · Risk · Fill model</text>
  <text x="470" y="426" class="corel" text-anchor="middle">Indicators (derive)</text>
  <text x="470" y="450" class="corel" text-anchor="middle">Normalize · Validate</text>
  <text x="470" y="474" class="corel" text-anchor="middle">Models · Events</text>

  <!-- application caption under hexagon -->
  <text x="470" y="672" class="appcap" text-anchor="middle">Application layer (app/): pipeline · backtest · paper &amp; shadow books</text>
  <text x="470" y="690" class="appcap" text-anchor="middle">vault · canonical store · APScheduler</text>

  <!-- ===================== DRIVING ADAPTERS (left) ===================== -->
  <!-- CLI -->
  <rect x="40" y="300" width="222" height="96" rx="12" fill="#FFFFFF" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
  <rect x="40" y="300" width="5" height="96" rx="2.5" fill="#0D9488"/>
  <text x="60" y="326" class="drv">CLI</text>
  <text x="60" y="348" class="drvs">run · backtest · replay · journal</text>
  <text x="60" y="365" class="drvs">ask · report · status · halt</text>
  <text x="60" y="385" class="drvs">bootstrap (fixtures)</text>
  <!-- Scheduler -->
  <rect x="40" y="408" width="222" height="70" rx="12" fill="#FFFFFF" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
  <rect x="40" y="408" width="5" height="70" rx="2.5" fill="#0D9488"/>
  <text x="60" y="434" class="drv">APScheduler</text>
  <text x="60" y="456" class="drvs">daily 17:30 ET · cron fallback</text>
  <!-- Dashboard -->
  <rect x="40" y="490" width="222" height="70" rx="12" fill="#FFFFFF" stroke="#334155" stroke-width="1.5" filter="url(#soft)"/>
  <rect x="40" y="490" width="5" height="70" rx="2.5" fill="#0D9488"/>
  <text x="60" y="516" class="drv">Streamlit dashboard</text>
  <text x="60" y="538" class="drvs">reads state via Store port</text>

  <!-- driving arrows into hexagon left edge -->
  <line x1="262" y1="346" x2="282" y2="350" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="262" y1="443" x2="282" y2="440" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="262" y1="525" x2="282" y2="510" stroke="#64748B" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- ===================== PORTS manifold ===================== -->
  <line x1="656.2" y1="430" x2="672" y2="430" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="672" y1="168" x2="672" y2="728" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="668" y="430" class="vlabel" text-anchor="middle" transform="rotate(-90 668 430)">THE ONLY I/O BOUNDARY</text>

  <!-- ===================== 9 PORT ROWS ===================== -->
  <!-- Row template: port pill (690..828), real chip (858..1020), fake chip (1030..1240) -->

  <!-- helper: each row drawn explicitly -->
  <!-- ROW 0 — Clock (y 168) -->
  <line x1="672" y1="168" x2="690" y2="168" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="828" y1="168" x2="1030" y2="168" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="690" y="143" width="138" height="50" rx="10" fill="#E6FAF8" stroke="#0D9488" stroke-width="1.6"/>
  <text x="759" y="173" class="port" text-anchor="middle">Clock</text>
  <rect x="858" y="143" width="162" height="50" rx="10" fill="#FFFFFF" stroke="#475569" stroke-width="1.4"/>
  <text x="872" y="161" class="badge" fill="#475569">REAL</text>
  <text x="939" y="180" class="adapt" text-anchor="middle">SystemClock</text>
  <rect x="1030" y="143" width="210" height="50" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.4"/>
  <text x="1044" y="161" class="badge" fill="#D97706">FAKE</text>
  <text x="1135" y="180" class="adaptf" text-anchor="middle">VirtualClock</text>

  <!-- ROW 1 — MarketData (y 238) -->
  <line x1="672" y1="238" x2="690" y2="238" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="828" y1="238" x2="1030" y2="238" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="690" y="213" width="138" height="50" rx="10" fill="#E6FAF8" stroke="#0D9488" stroke-width="1.6"/>
  <text x="759" y="243" class="port" text-anchor="middle">MarketData</text>
  <rect x="858" y="213" width="162" height="50" rx="10" fill="#FFFFFF" stroke="#475569" stroke-width="1.4"/>
  <text x="872" y="231" class="badge" fill="#475569">REAL</text>
  <text x="939" y="250" class="adapt" text-anchor="middle">EODHD · Alpaca</text>
  <rect x="1030" y="213" width="210" height="50" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.4"/>
  <text x="1044" y="231" class="badge" fill="#D97706">FAKE</text>
  <text x="1135" y="250" class="adaptf" text-anchor="middle">FixtureMarketData</text>

  <!-- ROW 2 — Fundamentals (y 308) -->
  <line x1="672" y1="308" x2="690" y2="308" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="828" y1="308" x2="1030" y2="308" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="690" y="283" width="138" height="50" rx="10" fill="#E6FAF8" stroke="#0D9488" stroke-width="1.6"/>
  <text x="759" y="313" class="port" text-anchor="middle">Fundamentals</text>
  <rect x="858" y="283" width="162" height="50" rx="10" fill="#FFFFFF" stroke="#475569" stroke-width="1.4"/>
  <text x="872" y="301" class="badge" fill="#475569">REAL</text>
  <text x="939" y="320" class="adapt" text-anchor="middle">EODHD</text>
  <rect x="1030" y="283" width="210" height="50" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.4"/>
  <text x="1044" y="301" class="badge" fill="#D97706">FAKE</text>
  <text x="1135" y="320" class="adaptf" text-anchor="middle">FixtureFundamentals</text>

  <!-- ROW 3 — InsiderFeed (y 378) -->
  <line x1="672" y1="378" x2="690" y2="378" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="828" y1="378" x2="1030" y2="378" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="690" y="353" width="138" height="50" rx="10" fill="#E6FAF8" stroke="#0D9488" stroke-width="1.6"/>
  <text x="759" y="383" class="port" text-anchor="middle">InsiderFeed</text>
  <rect x="858" y="353" width="162" height="50" rx="10" fill="#FFFFFF" stroke="#475569" stroke-width="1.4"/>
  <text x="872" y="371" class="badge" fill="#475569">REAL</text>
  <text x="939" y="390" class="adapt" text-anchor="middle">OpenInsider</text>
  <rect x="1030" y="353" width="210" height="50" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.4"/>
  <text x="1044" y="371" class="badge" fill="#D97706">FAKE</text>
  <text x="1135" y="390" class="adaptf" text-anchor="middle">FixtureInsiderFeed</text>

  <!-- ROW 4 — SentimentFeed (y 448) -->
  <line x1="672" y1="448" x2="690" y2="448" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="828" y1="448" x2="1030" y2="448" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="690" y="423" width="138" height="50" rx="10" fill="#E6FAF8" stroke="#0D9488" stroke-width="1.6"/>
  <text x="759" y="453" class="port" text-anchor="middle">SentimentFeed</text>
  <rect x="858" y="423" width="162" height="50" rx="10" fill="#FFFFFF" stroke="#475569" stroke-width="1.4"/>
  <text x="872" y="441" class="badge" fill="#475569">REAL</text>
  <text x="939" y="460" class="adapt" text-anchor="middle">Reddit JSON</text>
  <rect x="1030" y="423" width="210" height="50" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.4"/>
  <text x="1044" y="441" class="badge" fill="#D97706">FAKE</text>
  <text x="1135" y="460" class="adaptf" text-anchor="middle">FixtureSentimentFeed</text>

  <!-- ROW 5 — LLM (y 518) -->
  <line x1="672" y1="518" x2="690" y2="518" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="828" y1="518" x2="1030" y2="518" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="690" y="493" width="138" height="50" rx="10" fill="#E6FAF8" stroke="#0D9488" stroke-width="1.6"/>
  <text x="759" y="523" class="port" text-anchor="middle">LLM</text>
  <rect x="858" y="493" width="162" height="50" rx="10" fill="#FFFFFF" stroke="#475569" stroke-width="1.4"/>
  <text x="872" y="511" class="badge" fill="#475569">REAL</text>
  <text x="939" y="530" class="adapt" text-anchor="middle">OpenAI-compatible</text>
  <rect x="1030" y="493" width="210" height="50" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.4"/>
  <text x="1044" y="511" class="badge" fill="#D97706">FAKE</text>
  <text x="1135" y="530" class="adaptf" text-anchor="middle">CannedLLM</text>

  <!-- ROW 6 — Store (y 588) -->
  <line x1="672" y1="588" x2="690" y2="588" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="828" y1="588" x2="1030" y2="588" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="690" y="563" width="138" height="50" rx="10" fill="#E6FAF8" stroke="#0D9488" stroke-width="1.6"/>
  <text x="759" y="593" class="port" text-anchor="middle">Store</text>
  <rect x="858" y="563" width="162" height="50" rx="10" fill="#FFFFFF" stroke="#475569" stroke-width="1.4"/>
  <text x="872" y="581" class="badge" fill="#475569">REAL</text>
  <text x="939" y="600" class="adapt" text-anchor="middle">DuckDB Canonical</text>
  <rect x="1030" y="563" width="210" height="50" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.4"/>
  <text x="1044" y="581" class="badge" fill="#D97706">FAKE</text>
  <text x="1135" y="600" class="adaptf" text-anchor="middle">FixtureStore</text>

  <!-- ROW 7 — EventSink (y 658) -->
  <line x1="672" y1="658" x2="690" y2="658" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="828" y1="658" x2="1030" y2="658" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="690" y="633" width="138" height="50" rx="10" fill="#E6FAF8" stroke="#0D9488" stroke-width="1.6"/>
  <text x="759" y="663" class="port" text-anchor="middle">EventSink</text>
  <rect x="858" y="633" width="162" height="50" rx="10" fill="#FFFFFF" stroke="#475569" stroke-width="1.4"/>
  <text x="872" y="651" class="badge" fill="#475569">REAL</text>
  <text x="939" y="670" class="adapt" text-anchor="middle">SqliteEventSink</text>
  <rect x="1030" y="633" width="210" height="50" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.4"/>
  <text x="1044" y="651" class="badge" fill="#D97706">FAKE</text>
  <text x="1135" y="670" class="adaptf" text-anchor="middle">FakeEventSink</text>

  <!-- ROW 8 — Broker (y 728) -->
  <line x1="672" y1="728" x2="690" y2="728" stroke="#CBD5E1" stroke-width="1.5"/>
  <line x1="828" y1="728" x2="1030" y2="728" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="690" y="703" width="138" height="50" rx="10" fill="#E6FAF8" stroke="#0D9488" stroke-width="1.6"/>
  <text x="759" y="733" class="port" text-anchor="middle">Broker</text>
  <rect x="858" y="703" width="162" height="50" rx="10" fill="#FFFFFF" stroke="#94A3B8" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="872" y="721" class="badge" fill="#94A3B8">DESIGNED</text>
  <text x="939" y="740" class="adapt" fill="#94A3B8" text-anchor="middle" font-style="italic">not built (v1)</text>
  <rect x="1030" y="703" width="210" height="50" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.4"/>
  <text x="1044" y="721" class="badge" fill="#D97706">FAKE</text>
  <text x="1135" y="740" class="adaptf" text-anchor="middle">FakeBroker</text>

  <!-- ===================== Legend ===================== -->
  <g transform="translate(40,792)">
    <rect x="0" y="-11" width="15" height="15" rx="3" fill="#EEF0FF" stroke="#4F46E5"/>
    <text x="22" y="1" class="legend">Domain core (pure)</text>
    <rect x="172" y="-11" width="15" height="15" rx="3" fill="#E9EEF6" stroke="#94A3B8"/>
    <text x="194" y="1" class="legend">Application</text>
    <rect x="300" y="-11" width="15" height="15" rx="3" fill="#E6FAF8" stroke="#0D9488"/>
    <text x="322" y="1" class="legend">Port · contract seam</text>
    <rect x="470" y="-11" width="15" height="15" rx="3" fill="#FFFFFF" stroke="#475569"/>
    <text x="492" y="1" class="legend">Real adapter</text>
    <rect x="590" y="-11" width="15" height="15" rx="3" fill="#FFF7ED" stroke="#D97706"/>
    <text x="612" y="1" class="legend">Fake / fixture twin</text>
    <rect x="742" y="-11" width="15" height="15" rx="3" fill="#FFFFFF" stroke="#94A3B8" stroke-dasharray="4 3"/>
    <text x="764" y="1" class="legend">Designed, not built</text>
  </g>
  <text x="40" y="824" class="foot">The domain core never knows which reality it runs in — swap real adapters for fixtures and the same code drives live, backtest, replay, and paper.  ·  SEC connector (ticker→CIK) backs Universe &amp; MarketData.</text>
</svg>
