<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#a08030"/>
    </linearGradient>
    <linearGradient id="goldGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d060" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#46ebe1"/>
      <stop offset="100%" stop-color="#2a9d8f"/>
    </linearGradient>
    <linearGradient id="gridLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a84c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" rx="12" fill="url(#g1)"/>

  <!-- Grid lines -->
  <line x1="0" y1="30" x2="480" y2="30" stroke="url(#gridLine)" stroke-width="0.5"/>
  <line x1="0" y1="60" x2="480" y2="60" stroke="url(#gridLine)" stroke-width="0.5"/>
  <line x1="0" y1="90" x2="480" y2="90" stroke="url(#gridLine)" stroke-width="0.5"/>
  <line x1="115" y1="0" x2="115" y2="120" stroke="url(#gridLine)" stroke-width="0.5"/>

  <!-- === LOGO MARK: Alpha Symbol === -->

  <!-- Outer glow circle -->
  <circle cx="58" cy="60" r="42" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3" filter="url(#glowStrong)"/>

  <!-- Inner circle -->
  <circle cx="58" cy="60" r="38" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6"/>

  <!-- Alpha symbol (α) - geometric, inside circle -->
  <g transform="translate(58, 60)" filter="url(#glow)">
    <!-- Left arc of alpha -->
    <path d="M -2 -22 C -14 -22 -22 -12 -22 0 C -22 12 -14 22 0 22 C 14 22 22 12 22 0 C 22 -8 17 -15 10 -18 L -18 -26"
          stroke="url(#gold)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- Right tail of alpha -->
    <path d="M 10 -18 L 20 -26" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
    <!-- Horizontal bar -->
    <line x1="-4" y1="-2" x2="18" y2="-2" stroke="url(#teal)" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Small decorative dots -->
  <circle cx="42" cy="42" r="1.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="74" cy="78" r="1.5" fill="#46ebe1" opacity="0.5"/>

  <!-- === TEXT === -->

  <!-- ALPHAQUANT main title -->
  <text font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="700" letter-spacing="3" fill="#e8e8e8">
    <tspan x="130" y="62">ALPHA</tspan>
  </text>
  <text font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="38" font-weight="700" letter-spacing="3">
    <tspan x="300" y="62" fill="url(#gold)">Q</tspan><tspan fill="#e8e8e8">UANT</tspan>
  </text>

  <!-- Tagline -->
  <text x="130" y="90" font-family="'SF Mono', SFMono-Regular, 'SF Pro Display', -apple-system, monospace" font-size="11" font-weight="400" fill="#7a8a9a" letter-spacing="5">
    DETERMINISTIC  ·  DAILY  ·  LONG-ONLY
  </text>

  <!-- Version badge -->
  <rect x="130" y="97" width="52" height="16" rx="3" fill="#1a2332" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/>
  <text x="133" y="108" font-family="'SF Mono', monospace" font-size="9" fill="#c9a84c" opacity="0.8">v0.1.0</text>
</svg>
