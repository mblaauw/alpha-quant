name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check alpha_quant/

      - name: Ruff format
        run: uv run ruff format --check alpha_quant/

      - name: Type check
        run: uv run ty check alpha_quant/

      - name: Run tests
        run: uv run pytest

      - name: Bootstrap fixtures
        run: |
          export PYTHONHASHSEED=0
          uv run alpha-quant bootstrap

      - name: Stub replay (no DAG yet — #97)
        run: |
          export PYTHONHASHSEED=0
          uv run alpha-quant replay \
            --from-date 2024-01-01 \
            --to-date 2024-01-31 \
            --output fixtures/golden/stub_golden_run.json

      - name: Verify stub golden hash (placeholder — #97)
        run: |
          EXPECTED_HASH=$(sha256sum fixtures/golden/stub_golden_run.json | cut -d' ' -f1)
          echo "Golden hash: ${EXPECTED_HASH}"
          git diff --exit-code fixtures/golden/stub_golden_run.json || {
            echo "::error::Golden file mismatch! Run 'make bless-golden' to update."
            exit 1
          }

      - name: Verify no alpaca.trading import
        run: |
          RESULT=$(grep -rn "alpaca\.trading" alpha_quant/ --include="*.py" || true)
          if [ -n "$RESULT" ]; then
            echo "::error::alpaca.trading imported — only data module allowed"
            echo "$RESULT"
            exit 1
          fi

      - name: Verify no clock readings in domain core (I9)
        run: |
          RESULT=$(grep -rnE "(datetime\.now\(|date\.today\(|time\.time\()" alpha_quant/domain/ \
            --include="*.py" || true)
          if [ -n "$RESULT" ]; then
            echo "::error::Clock reading in domain/ violates I9. Route through Clock port."
            echo "$RESULT"
            exit 1
          fi
