name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check alpha_quant/

      - name: Format (ruff format)
        run: uv run ruff format --check alpha_quant/

      - name: Type check (ty)
        run: uv run ty check alpha_quant/

      - name: Test with coverage
        run: uv run pytest -q --cov=alpha_quant --cov-report=term --cov-fail-under=70

      - name: Golden replay (determinism)
        run: |
          export PYTHONHASHSEED=0
          make bootstrap
          make golden

      - name: Verify golden hash
        run: |
          git diff --exit-code fixtures/golden/golden_run.json || {
            echo "::error::Golden file mismatch! Run 'make bless-golden' to update."
            exit 1
          }

      - name: Verify no alpaca.trading import (I13) — broker adapter is the only exception
        run: |
          RESULT=$(grep -rn "alpaca\.trading" alpha_quant/ --include="*.py" \
            --exclude="alpaca_broker.py" || true)
          if [ -n "$RESULT" ]; then
            echo "::error::alpaca.trading imported outside broker adapter"
            echo "$RESULT"
            exit 1
          fi

      - name: Verify no clock readings in domain core (I9) — events.py default_factory is excluded
        run: |
          RESULT=$(grep -rnE "(datetime\.now\(|date\.today\(|time\.time\()" alpha_quant/domain/ \
            --include="*.py" --exclude="events.py" || true)
          if [ -n "$RESULT" ]; then
            echo "::error::Clock reading in domain/ violates I9. Route through Clock port."
            echo "$RESULT"
            exit 1
          fi

      - name: Verify no bare datetime.now() without UTC
        run: |
          RESULT=$(grep -rn "datetime\.now(" alpha_quant/ --include="*.py" \
            --exclude="alpha_quant/adapters/real/clock.py" | grep -v "now(UTC)" || true)
          if [ -n "$RESULT" ]; then
            echo "::error::datetime.now() called without UTC. Use datetime.now(UTC)."
            echo "$RESULT"
            exit 1
          fi
