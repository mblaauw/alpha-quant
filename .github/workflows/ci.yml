name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check alpha_quant/

      - name: Ruff format
        run: uv run ruff format --check alpha_quant/

      - name: Type check
        run: uv run ty check alpha_quant/

      - name: Bootstrap fixtures
        run: uv run alpha-quant bootstrap

      - name: Golden replay
        run: |
          uv run alpha-quant replay \
            --from-date 2024-01-01 \
            --to-date 2024-01-31 \
            --output fixtures/golden/golden_run.json

      - name: Verify golden hash
        run: |
          EXPECTED_HASH=$(sha256sum fixtures/golden/golden_run.json | cut -d' ' -f1)
          echo "Golden hash: ${EXPECTED_HASH}"
          git diff --exit-code fixtures/golden/golden_run.json || {
            echo "::error::Golden file mismatch! Run 'make bless-golden' to update."
            exit 1
          }

      - name: Verify no datetime.now() outside clock adapter
        run: |
          RESULT=$(grep -rn "datetime\.now(" alpha_quant/ --include="*.py" | grep -v "adapters/real/clock.py" || true)
          if [ -n "$RESULT" ]; then
            echo "::error::datetime.now() found outside clock adapter"
            echo "$RESULT"
            exit 1
          fi
