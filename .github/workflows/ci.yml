name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check src/

      - name: Format (ruff format)
        run: uv run ruff format --check src/

      - name: Type check — src/ and tests/
        run: uv run ty check src/ tests/

      - name: Architecture checks
        run: bash scripts/check_architecture.sh

      - name: Test with coverage (parallel)
        run: uv run pytest -q -n auto --cov=src --cov-report=term --cov-fail-under=70 -m "not chaos"

      - name: Verify no clock readings in domain core (I9)
        run: |
          RESULT=$(grep -rnE "(datetime\.now\(|date\.today\(|time\.time\()" src/alpha_quant/domain/ \
            --include="*.py" --exclude="events.py" || true)
          if [ -n "$RESULT" ]; then
            echo "::error::Clock reading in domain/ violates I9. Route through Clock port."
            echo "$RESULT"
            exit 1
          fi

      - name: Verify no bare datetime.now() without UTC
        run: |
          RESULT=$(grep -rn "datetime\.now(" src/ --include="*.py" \
            --exclude="src/alpha_quant/adapters/real/clock.py" | grep -v "now(UTC)" || true)
          if [ -n "$RESULT" ]; then
            echo "::error::datetime.now() called without UTC. Use datetime.now(UTC)."
            echo "$RESULT"
            exit 1
          fi

      - name: Verify no provider API keys in .env.example
        run: |
          for key in EODHD TIINGO REDDIT; do
            if grep -q "$key" .env.example; then
              echo "::error::Provider env var $key still in .env.example"
              exit 1
            fi
          done

      - name: Verify no API keys or secrets in source
        run: |
          RESULT=$(git grep -nE 'sk-[A-Za-z0-9]{20,}|pk-[A-Za-z0-9]{16,}' \
            -- '*.py' '*.toml' ':^config.local.toml' ':^*.example' ':^*.md' || true)
          if [ -n "$RESULT" ]; then
            echo "::error::API key pattern detected in source files. Never commit secrets."
            echo "$RESULT"
            exit 1
          fi
