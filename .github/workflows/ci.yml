name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: pyproject.toml

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint (ruff check)
        run: uv run ruff check src/

      - name: Format (ruff format)
        run: uv run ruff format --check src/

      - name: Type check (ty)
        run: uv run ty check src/

      - name: Architecture checks
        run: bash scripts/check_architecture.sh

      - name: Test with coverage
        run: uv run pytest -q --cov=src --cov-report=term --cov-fail-under=70

      - name: Verify no alpaca.trading import (I13) — broker adapter is the only exception
        run: |
          RESULT=$(grep -rn "alpaca\.trading" src/ --include="*.py" \
            --exclude="alpaca_broker.py" || true)
          if [ -n "$RESULT" ]; then
            echo "::error::alpaca.trading imported outside broker adapter"
            echo "$RESULT"
            exit 1
          fi

      - name: Verify no clock readings in domain core (I9) — events.py default_factory is excluded
        run: |
          RESULT=$(grep -rnE "(datetime\.now\(|date\.today\(|time\.time\()" src/domain/ \
            --include="*.py" --exclude="events.py" || true)
          if [ -n "$RESULT" ]; then
            echo "::error::Clock reading in domain/ violates I9. Route through Clock port."
            echo "$RESULT"
            exit 1
          fi

      - name: Verify no bare datetime.now() without UTC
        run: |
          RESULT=$(grep -rn "datetime\.now(" src/ --include="*.py" \
            --exclude="src/adapters/real/clock.py" | grep -v "now(UTC)" || true)
          if [ -n "$RESULT" ]; then
            echo "::error::datetime.now() called without UTC. Use datetime.now(UTC)."
            echo "$RESULT"
            exit 1
          fi

      - name: Verify no API keys or secrets in source
        run: |
          RESULT=$(git grep -nE 'sk-[A-Za-z0-9]{20,}|pk-[A-Za-z0-9]{16,}' \
            -- '*.py' '*.toml' ':^config.local.toml' ':^*.example' ':^*.md' || true)
          if [ -n "$RESULT" ]; then
            echo "::error::API key pattern detected in source files. Never commit secrets."
            echo "$RESULT"
            exit 1
          fi
