services:
  postgres:
    image: postgres:17-alpine
    volumes:
      - alpha_quant_pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: alpha_quant
      POSTGRES_USER: alpha_quant
      POSTGRES_PASSWORD: alpha_quant_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alpha_quant -d alpha_quant"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["db-migrate"]
    environment:
      DATABASE_URL: postgresql+psycopg://alpha_quant:alpha_quant_dev@postgres:5432/alpha_quant
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["dashboard", "--host", "0.0.0.0", "--port", "8501"]
    ports:
      - "8501:8501"
    environment:
      DATABASE_URL: postgresql+psycopg://alpha_quant:alpha_quant_dev@postgres:5432/alpha_quant
      ALPHA_QUANT_LAKE__MODE: rest
      ALPHA_QUANT_LAKE__BASE_URL: "${ALPHA_QUANT_LAKE__BASE_URL:-http://host.docker.internal:8000}"
      ALPHA_LAKE_API_KEY: "${ALPHA_LAKE_API_KEY:-}"
      ALPHA_QUANT_DASHBOARD__HOST: 0.0.0.0
      ALPHA_QUANT_DASHBOARD__PORT: 8501
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["worker", "--poll-interval", "1"]
    environment:
      DATABASE_URL: postgresql+psycopg://alpha_quant:alpha_quant_dev@postgres:5432/alpha_quant
      ALPHA_QUANT_LAKE__MODE: rest
      ALPHA_QUANT_LAKE__BASE_URL: "${ALPHA_QUANT_LAKE__BASE_URL:-http://host.docker.internal:8000}"
      ALPHA_LAKE_API_KEY: "${ALPHA_LAKE_API_KEY:-}"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  alpha_quant_pgdata:
    name: alpha-quant_pgdata
    external: true
